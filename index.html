<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultron AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       STATUS BAR — online/offline indicator
       JS adds class "online" or "offline" to this
  ═══════════════════════════════════════════ -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Connecting...</span>
  </div>

  <!-- ═══════════════════════════════════════════
       AI CORE — particle animation canvas
       Canvas dimensions set by JS via resizeCanvas()
  ═══════════════════════════════════════════ -->
  <div class="core-section">

    <!-- Canvas wrapper — takes full width on mobile,
         left portion on desktop (right side used for suggestions) -->
    <div class="core-canvas-wrap">
      <canvas id="aiBall"></canvas>
    </div>

    <!-- Powered by — flex item between canvas and suggestion panel -->
    <p class="powered-by">Powered by Yash Datta Dalvi</p>

    <!-- Suggestion panel — mobile only (hidden on desktop via CSS) -->
    <div class="suggestion-panel hidden" id="suggestionPanel">
      <p class="suggestion-label">Try asking</p>
      <div class="suggestion-text" id="suggestionText"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       CHAT SECTION — bottom sheet
       All layout in style.css
  ═══════════════════════════════════════════ -->
  <div class="chat-section">

    <!-- Header: title + theme toggle + mic -->
    <div class="chat-header">
      <span class="chat-title">Ultron</span>
      <div class="header-actions">

        <!-- Dark/Light mode toggle — JS toggles body.dark + rotates this button -->
        <button class="icon-btn" id="themeBtn" aria-label="Toggle dark mode">
          <!-- Moon icon (shown in light mode) -->
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <!-- Sun icon (shown in dark mode) — hidden by default -->
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>

        <!-- Mic button -->
        <button class="icon-btn" id="voiceBtn" aria-label="Voice input">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- Scrollable messages -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Input bar — mic removed from here, only text + send -->
    <div class="chat-input-bar">
      <input
        type="text"
        id="chatInput"
        placeholder="Message Ultron..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
